<!DOCTYPE html>
<html lang="kk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ана Әке Кестесі</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Отбасы кестесі</p>
          <h1>Ана мен әке</h1>
          <p class="hero-copy">Екі баған, айлық көрініс.</p>
        </div>

        <div class="today-panel">
          <p class="today-label">Бүгін</p>
          <h2 id="todayDate"></h2>
          <div class="today-statuses">
            <div class="today-card mama-accent">
              <span>Ана</span>
              <strong id="todayMama"></strong>
            </div>
            <div class="today-card papa-accent">
              <span>Әке</span>
              <strong id="todayPapa"></strong>
            </div>
          </div>
        </div>
      </header>

      <section class="controls" aria-label="Күнтізбе басқаруы">
        <button id="prevMonth" type="button" aria-label="Алдыңғы ай">←</button>
        <div class="month-title" id="monthTitle"></div>
        <button id="nextMonth" type="button" aria-label="Келесі ай">→</button>
      </section>

      <section class="legend" aria-label="Кесте белгілері">
        <div class="legend-item work">Жұмыс</div>
        <div class="legend-item sleep">Таң ұйқысы</div>
        <div class="legend-item rest">Демалыс</div>
        <div class="legend-item day">Күндіз</div>
        <div class="legend-item night">Түн</div>
      </section>

      <main class="calendar-layout">
        <section class="calendar-card">
          <div class="calendar-header">
            <div>
              <p class="calendar-label">mama</p>
              <h2>Ана</h2>
            </div>
            <p class="cycle-note">Жұмыс → Ұйқы → Демалыс</p>
          </div>
          <div class="weekday-row" id="mamaWeekdays"></div>
          <div class="calendar-grid" id="mamaCalendar"></div>
        </section>

        <section class="calendar-card">
          <div class="calendar-header">
            <div>
              <p class="calendar-label">papa</p>
              <h2>Әке</h2>
            </div>
            <p class="cycle-note">Күндіз → Түн → Ұйқы → Демалыс</p>
          </div>
          <div class="weekday-row" id="papaWeekdays"></div>
          <div class="calendar-grid" id="papaCalendar"></div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
